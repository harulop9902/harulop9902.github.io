  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

top:0; z-index:50; background:rgba(26,23,20,0.82); backdrop-filter:blur(12px); border-bottom:1px solid #2a231d;\">\n    <div style=\"max-width:1120px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; padding:18px 40px;\">\n      <div style=\"font-family:'Libre Caslon Display',serif; font-size:21px; letter-spacing:0.01em;\">Harvey López<\u002Fdiv>\n      <div style=\"display:flex; gap:30px; font-size:14px;\">\n        <a class=\"navlink\" href=\"#sobre\">Sobre mí<\u002Fa>\n        <a class=\"navlink\" href=\"#experiencia\">Experiencia<\u002Fa>\n        <a class=\"navlink\" href=\"#areas\">Especialización<\u002Fa>\n        <a class=\"navlink\" href=\"#trabajo\">Trabajo<\u002Fa>\n        <a class=\"navlink\" href=\"#educacion\">Formación<\u002Fa>\n        <a class=\"navlink\" href=\"#contacto\">Contacto<\u002Fa>\n      <\u002Fdiv>\n      <a href=\"#contacto\" style=\"text-decoration:none; font-size:13.5px; font-weight:600; color:#1a1714; background:var(--accent); padding:10px 20px; border-radius:999px;\">Contáctame<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============ HERO ============ -->\n  <div style=\"max-width:1120px; margin:0 auto; display:grid; grid-template-columns:1.12fr 0.88fr; gap:48px; padding:80px 40px 76px; align-items:center;\">\n    <div>\n      <div style=\"display:inline-flex; align-items:center; gap:9px; font-size:13px; letter-spacing:0.05em; color:var(--accent); background:color-mix(in srgb, var(--accent) 13%, transparent); border:1px solid color-mix(in srgb, var(--accent) 28%, transparent); padding:8px 16px; border-radius:999px; margin-bottom:28px;\">● Analista de Gestión de Talento<\u002Fdiv>\n      <h1 style=\"font-family:'Libre Caslon Display',serif; font-weight:400; font-size:66px; line-height:1.03; margin:0 0 26px; letter-spacing:-0.005em;\">Talento que decide<br><span style=\"color:var(--accent);\">quedarse.<\u002Fspan><\u002Fh1>\n      <p style=\"font-size:17px; line-height:1.62; color:#b7ac9f; margin:0 0 34px; max-width:92%;\">Especialista en fidelización de talento, bienestar y desarrollo organizacional. 4 años creando culturas donde las personas crecen y eligen quedarse.<\u002Fp>\n      <div style=\"display:flex; gap:14px; margin-bottom:34px; flex-wrap:wrap;\">\n        <a href=\"#trabajo\" style=\"text-decoration:none; display:inline-flex; align-items:center; gap:10px; font-size:15px; font-weight:600; color:#1a1714; background:var(--accent); padding:14px 26px; border-radius:999px;\">Conoce mi trabajo →<\u002Fa>\n        <a href=\"#experiencia\" style=\"text-decoration:none; display:inline-flex; align-items:center; font-size:15px; color:#f0e9e1; border:1px solid #3a322b; padding:14px 26px; border-radius:999px;\">Ver experiencia<\u002Fa>\n      <\u002Fdiv>\n      <div style=\"display:flex; gap:26px; font-size:13px; color:#8a8178; flex-wrap:wrap;\"><span>✓ Fidelización de Talento<\u002Fspan><span>✓ Clima &amp; Cultura<\u002Fspan><span>✓ Eventos Corporativos<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"position:relative;\">\n      <image-slot id=\"harvey-retrato\" shape=\"rounded\" radius=\"10\" fit=\"cover\" placeholder=\"Arrastra aquí tu retrato profesional\" style=\"width:100%; aspect-ratio:4/5; border:1px solid #332b25; background-color:#221d19;\" class=\"stripe\"><\u002Fimage-slot>\n      <div style=\"position:absolute; bottom:18px; left:18px; right:18px; background:rgba(26,23,20,0.78); backdrop-filter:blur(6px); border:1px solid #3a322b; border-radius:8px; padding:14px 16px; display:flex; align-items:center; gap:12px;\">\n        <div style=\"width:38px; height:38px; border-radius:8px; background:color-mix(in srgb, var(--accent) 16%, transparent); display:flex; align-items:center; justify-content:center; color:var(--accent); font-size:18px;\">★<\u002Fdiv>\n        <div><div style=\"font-size:14px; font-weight:600;\">4 años en Recursos Humanos<\u002Fdiv><div style=\"font-size:12px; color:#9b9084;\">Todos los subsistemas de RRHH<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============ MÉTRICAS ============ -->\n  <div style=\"background:#16130f; border-top:1px solid #2a231d; border-bottom:1px solid #2a231d;\">\n    <div style=\"max-width:1120px; margin:0 auto; display:grid; grid-template-columns:repeat(4,1fr);\">\n      <div style=\"padding:38px 30px; border-right:1px solid #2a231d;\"><div style=\"font-family:'Libre Caslon Display',serif; font-size:46px; color:var(--accent); line-height:1;\">90–92%<\u002Fdiv><div style=\"font-size:13px; color:#9b9084; margin-top:10px;\">Fidelización en puestos clave<\u002Fdiv><\u002Fdiv>\n      <div style=\"padding:38px 30px; border-right:1px solid #2a231d;\"><div style=\"font-family:'Libre Caslon Display',serif; font-size:46px; color:var(--accent); line-height:1;\">+90<\u002Fdiv><div style=\"font-size:13px; color:#9b9084; margin-top:10px;\">eNPS organizacional<\u002Fdiv><\u002Fdiv>\n      <div style=\"padding:38px 30px; border-right:1px solid #2a231d;\"><div style=\"font-family:'Libre Caslon Display',serif; font-size:46px; color:var(--accent); line-height:1;\">+90<\u002Fdiv><div style=\"font-size:13px; color:#9b9084; margin-top:10px;\">Satisfacción en eventos<\u002Fdiv><\u002Fdiv>\n      <div style=\"padding:38px 30px;\"><div style=\"font-family:'Libre Caslon Display',serif; font-size:46px; color:var(--accent); line-height:1;\">90%<\u002Fdiv><div style=\"font-size:13px; color:#9b9084; margin-top:10px;\">Cierre de brechas de capacitación<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============ SOBRE MÍ ============ -->\n  <div id=\"sobre\" style=\"max-width:1120px; margin:0 auto; padding:88px 40px; display:grid; grid-template-columns:0.85fr 1.15fr; gap:54px; align-items:center;\">\n    <image-slot id=\"harvey-sobre\" shape=\"rounded\" radius=\"10\" fit=\"cover\" placeholder=\"Foto tuya en acción\" style=\"width:100%; aspect-ratio:1/1; border:1px solid #332b25; background-color:#221d19;\" class=\"stripe\"><\u002Fimage-slot>\n    <div>\n      <div style=\"font-size:13px; letter-spacing:0.12em; text-transform:uppercase; color:#8a8178; margin-bottom:14px;\">Sobre mí<\u002Fdiv>\n      <h2 style=\"font-family:'Libre Caslon Display',serif; font-weight:400; font-size:40px; line-height:1.1; margin:0 0 24px;\">Las personas primero,<br>los resultados en consecuencia<\u002Fh2>\n      <p style=\"font-size:16.5px; line-height:1.7; color:#b7ac9f; margin:0 0 18px;\">Soy Analista de Recursos Humanos. Tuve el privilegio de formar parte del <strong style=\"color:#f0e9e1; font-weight:600;\">primer equipo de Gestión de Talento<\u002Fstrong> en una empresa de telecomunicaciones, una experiencia que definió mi forma de entender el área.<\u002Fp>\n      <p style=\"font-size:16.5px; line-height:1.7; color:#b7ac9f; margin:0;\">A lo largo de 4 años me he desempeñado en <strong style=\"color:#f0e9e1; font-weight:600;\">todos los subsistemas de Recursos Humanos<\u002Fstrong>, con especialización en la creación y dirección del área de Fidelización de Talento y Desarrollo Organizacional.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============ EXPERIENCIA ============ -->\n  <div id=\"experiencia\" style=\"background:#16130f; border-top:1px solid #2a231d; border-bottom:1px solid #2a231d;\">\n    <div style=\"max-width:1120px; margin:0 auto; padding:88px 40px;\">\n      <div style=\"margin-bottom:52px;\">\n        <div style=\"font-size:13px; letter-spacing:0.12em; text-transform:uppercase; color:#8a8178; margin-bottom:14px;\">Trayectoria<\u002Fdiv>\n        <h2 style=\"font-family:'Libre Caslon Display',serif; font-weight:400; font-size:42px; margin:0;\">Experiencia <span style=\"color:var(--accent);\">profesional<\u002Fspan><\u002Fh2>\n      <\u002Fdiv>\n\n      <div style=\"display:flex; flex-direction:column; gap:0;\">\n        <!-- NABLA -->\n        <div style=\"display:grid; grid-template-columns:230px 1fr; gap:36px; padding:34px 0; border-top:1px solid #2a231d;\">\n          <div>\n            <div style=\"font-size:12.5px; color:var(--accent); font-family:'Space Grotesk',monospace; letter-spacing:0.04em; margin-bottom:8px;\">ENE 2025 — ACTUAL<\u002Fdiv>\n            <div style=\"font-family:'Libre Caslon Display',serif; font-size:21px;\">NABLA Residencial<\u002Fdiv>\n            <div style=\"font-size:13.5px; color:#9b9084; margin-top:4px;\">Analista de Recursos Humanos · Nivel 2<\u002Fdiv>\n          <\u002Fdiv>\n          <ul style=\"margin:0; padding:0; list-style:none; display:flex; flex-direction:column; gap:12px;\">\n            <li style=\"display:flex; gap:12px; font-size:15px; line-height:1.55; color:#b7ac9f;\"><span style=\"color:var(--accent); margin-top:1px;\">—<\u002Fspan>Implementación de KPI's de procesos de RRHH: capacitación, impacto emocional de programas de fidelización y actividades culturales.<\u002Fli>\n            <li style=\"display:flex; gap:12px; font-size:15px; line-height:1.55; color:#b7ac9f;\"><span style=\"color:var(--accent); margin-top:1px;\">—<\u002Fspan>Diseño de planes de acción derivados de resultados de clima organizacional.<\u002Fli>\n            <li style=\"display:flex; gap:12px; font-size:15px; line-height:1.55; color:#b7ac9f;\"><span style=\"color:var(--accent); margin-top:1px;\">—<\u002Fspan>Implementación de beneficios flexibles y alianzas corporativas con alcance del 100% de la organización.<\u002Fli>\n            <li style=\"display:flex; gap:12px; font-size:15px; line-height:1.55; color:#b7ac9f;\"><span style=\"color:var(--accent); margin-top:1px;\">—<\u002Fspan>Manejo de nómina administrativa para +100 colaboradores.<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n        <!-- FLORIDA -->\n        <div style=\"display:grid; grid-template-columns:230px 1fr; gap:36px; padding:34px 0; border-top:1px solid #2a231d;\">\n          <div>\n            <div style=\"font-size:12.5px; color:var(--accent); font-family:'Space Grotesk',monospace; letter-spacing:0.04em; margin-bottom:8px;\">JUL 2024 — ENE 2025<\u002Fdiv>\n            <div style=\"font-family:'Libre Caslon Display',serif; font-size:21px;\">Industrias Florida<\u002Fdiv>\n            <div style=\"font-size:13.5px; color:#9b9084; margin-top:4px;\">Generalista de Gestión de Talento<\u002Fdiv>\n          <\u002Fdiv>\n          <ul style=\"margin:0; padding:0; list-style:none; display:flex; flex-direction:column; gap:12px;\">\n            <li style=\"display:flex; gap:12px; font-size:15px; line-height:1.55; color:#b7ac9f;\"><span style=\"color:var(--accent); margin-top:1px;\">—<\u002Fspan>Ciclo completo de RRHH para HC 150 en Ciudad de Guatemala, con soporte a 300 colaboradores a nivel nacional, reportando a Gerencia Regional.<\u002Fli>\n            <li style=\"display:flex; gap:12px; font-size:15px; line-height:1.55; color:#b7ac9f;\"><span style=\"color:var(--accent); margin-top:1px;\">—<\u002Fspan>Auditoría y ordenamiento documental: corrección de inconsistencias en expedientes e implementación de matriz legal de papelería y formatos automatizados.<\u002Fli>\n            <li style=\"display:flex; gap:12px; font-size:15px; line-height:1.55; color:#b7ac9f;\"><span style=\"color:var(--accent); margin-top:1px;\">—<\u002Fspan>Supervisión y desarrollo de 2 colaboradores directos.<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n        <!-- INNOVA -->\n        <div style=\"display:grid; grid-template-columns:230px 1fr; gap:36px; padding:34px 0; border-top:1px solid #2a231d; border-bottom:1px solid #2a231d;\">\n          <div>\n            <div style=\"font-size:12.5px; color:var(--accent); font-family:'Space Grotesk',monospace; letter-spacing:0.04em; margin-bottom:8px;\">JUN 2022 — ABR 2024<\u002Fdiv>\n            <div style=\"font-family:'Libre Caslon Display',serif; font-size:21px;\">Innova Telecomunicaciones<\u002Fdiv>\n            <div style=\"font-size:13.5px; color:#9b9084; margin-top:4px;\">Analista de Fidelización de Talento<\u002Fdiv>\n          <\u002Fdiv>\n          <ul style=\"margin:0; padding:0; list
